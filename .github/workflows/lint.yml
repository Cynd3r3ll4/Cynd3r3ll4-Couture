name: Lint and Test Website   # Name des Workflows, erscheint in GitHub Actions

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Holt dein Repo in den Runner

      - name: Build Docker image (inkl. Linting-Stage)
        run: docker build -t mysite:ci -f Webseite/Dockerfile .
        # Dieser Schritt baut das Image UND führt dabei htmlhint sowie stylelint aus.
        # Schlagen die Linter fehl, schlägt dieser Schritt fehl – der Job wird als "failed" markiert.

      - name: Show Docker image size
        run: docker images mysite:ci --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

      - name: Run container and smoke-test it
        run: |
          docker run -d --name smoke-test -p 8080:80 mysite:ci
          sleep 2
          curl --fail http://localhost:8080/index.html
          docker stop smoke-test