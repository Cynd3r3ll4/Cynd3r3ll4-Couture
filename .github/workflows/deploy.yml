name: Deploy to AWS  # Name des Workflows, sichtbar in GitHub Actions

on:
  push:
    branches:
      - main  # Workflow startet bei Push auf main

permissions:
  id-token: write  # erlaubt OIDC Token für Cloud-Provider (keine statischen Keys)
  contents: read   # erlaubt Checkout des Repository-Inhalts

jobs:
  deploy-staging:  # Jobname: automatisches Deployment in die Staging-Umgebung
    runs-on: ubuntu-latest  # Runner-Typ, auf dem der Job läuft
    steps:
      - name: Checkout code  # Schrittname
        uses: actions/checkout@v4  # holt den Code aus dem Repo

      - name: Configure AWS credentials  # Schrittname
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # konfiguriert AWS OIDC Role
        with:
          role-to-assume: ${{ secrets.AWS_ROLLE_STAGING }}  # ARN der GitHub-Rolle aus Environment-Secret
          aws-region: eu-central-1  # AWS Region

      - name: Sync to S3 (staging)  # Schrittname
        run: |  # führt mehrere Shell-Zeilen aus, synchronisiert lokalen Ordner mit Staging-Bucket
          aws s3 sync Webseite/ s3://cloud-programming-bucket-cynd3r3ll4-staging --delete

    environment:
      name: staging  # weist diesen Job dem GitHub Environment 'staging' zu

  deploy-production:  # Jobname: Deployment in Production, erfordert Approval wenn Environment geschützt ist
    needs: deploy-staging  # läuft erst, wenn deploy-staging erfolgreich war
    runs-on: ubuntu-latest  # Runner-Typ
    steps:
      - name: Checkout code  # Schrittname
        uses: actions/checkout@v4  # holt den Code aus dem Repo

      - name: Configure AWS credentials  # Schrittname
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # konfiguriert AWS OIDC Role
        with:
          role-to-assume: ${{ secrets.AWS_ROLLE_PRODUCTION }}  # ARN der GitHub-Rolle aus Environment-Secret
          aws-region: eu-central-1  # AWS Region

      - name: Sync to S3 (production)  # Schrittname
        run: |  # führt mehrere Shell-Zeilen aus, synchronisiert lokalen Ordner mit Production-Bucket
          aws s3 sync Webseite/ s3://cloud-programming-bucket-cynd3r3ll4 --delete

      - name: Invalidate CloudFront cache  # Schrittname
        run: |  # führt mehrere Shell-Zeilen aus
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"  # invalidiert CloudFront-Cache, damit neue Dateien ausgeliefert werden

    environment:
      name: production  # weist diesen Job dem GitHub Environment 'production' zu (führt Approval aus, wenn geschützt)
