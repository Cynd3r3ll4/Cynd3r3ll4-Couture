name: Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLLE }}
          aws-region: eu-central-1

      - name: Sync to S3
        run: |
          aws s3 sync ./ s3://cloud-programming-bucket-cynd3r3ll4 --delete
